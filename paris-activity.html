<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris Activities</title>

    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="paris-activity-screen">

    <div class="price-tag">
        <div class="currency">$</div>
        <div class="amount">4,000</div>
    </div>

    <div class="activity-header">
        <h1>Explore Paris!</h1>
        <p>Choose an activity for your family adventure.</p>
    </div>

    <div class="paris-scene">

        <!-- background -->
        <img src="Images/Paris/paris-background.png" class="paris-background">

            <!-- First Activity -->
            <div class="activity-option tower-option">
                <img src="Images/Paris/Paris Activity/paris-activity1.png"
                    class="activity-icon">

                <button onclick="buyActivity(150,'paris-minigame1.html')">
                    Select - $150
                </button>
            </div>

            <!-- Second Activity -->
            <div class="activity-option museum-option">
                <img src="Images/Paris/Paris Activity/paris-activity2.png"
                    class="activity-icon">

                <button onclick="buyActivity(200,'paris-minigame2.html')">
                    Select - $200
                </button>
            </div>

            <!-- Third Activity -->
            <div class="activity-option dining-option">
                <img src="Images/Paris/Paris Activity/paris-activity3.png"
                    class="activity-icon">

                <button onclick="buyActivity(400,'paris-minigame3.html')">
                    Select - $400
                </button>
            </div>

    </div>

</div>

<script src="game.js"></script>
</body>
</html>
