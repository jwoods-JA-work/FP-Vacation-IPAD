<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victory! - Travel the World</title>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="victory-screen">
        <div class="end-card victory-card">
            <h1>🎉 YOU DID IT! 🎉</h1>
            <h2>Around-The-World Challenge Complete</h2>
            <p>
                You survived the journey across 4 continents, completed all the activities, and made it back home!
            </p>
        

            <div class="secret-codes">
                <h3>🏆 YOUR SECRET WINNER CODES 🏆</h3>                
                <div class="code-box">🌍 Vacation Code - 310 🌍</div>
                <div class="code-box">🧗‍♀️ Activities Code - 136 🧗‍♀️</div>
            </div>

            <button onclick="restartGame()">PLAN ANOTHER TRIP</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
