<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Over - Travel the World</title>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="gameover-screen">
        <div class="end-card gameover-card">
            <h1>💸 OUT OF FUNDS! 💸</h1>
            <h2>Vacation Canceled</h2>
            <p>
                Oh no! You spent too much money and your budget dropped below $0. <br><br>
                Your family had to pack their bags and take an emergency flight home early. 
            </p>

            <button onclick="restartGame()">TRY AGAIN</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
