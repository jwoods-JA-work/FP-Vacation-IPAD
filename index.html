<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Finance Park: Vacation Game</title>

        <link href = "https://fonts.googleapis.com/css2?family=Titan+One&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
        <link rel = "stylesheet" href="style.css">

    </head>
    <body>
        <div id = "start-screen">
            <div class="flag-carousel">
                <div class="flag-track">
                    <div class = "flag-set">
                        <img src="Images/Flags/usa.png" alt="US flag">
                        <img src="Images/Flags/mexico.png" alt="Mexico flag">
                        <img src="Images/Flags/france.png" alt="France flag">
                        <img src="Images/Flags/japan.png" alt="Japan flag">
                        <img src="Images/Flags/ghana.png" alt="Ghana flag">
                        <img src="Images/Flags/spain.png" alt = "Spain Flag">
                    </div>

                    <div class = "flag-set" >
                    <!-- duplicate for seamless loop -->
                        <img src="Images/Flags/usa.png" alt="US flag">
                        <img src="Images/Flags/mexico.png" alt="Mexico flag">
                        <img src="Images/Flags/france.png" alt="France flag">
                        <img src="Images/Flags/japan.png" alt="Japan flag">
                        <img src="Images/Flags/ghana.png" alt="Ghana flag">
                        <img src="Images/Flags/spain.png" alt = "Spain Flag">
                    </div>
                   
                </div>
            </div>

            <!--Clouds-->
            <div class = "cloud cloud-top-left"></div>
            <div class = "cloud cloud-bottom-right"></div>
            <div class = "start-card">
                <h1>
                    Plan a Family Adventure:<br>
                    Travel the World
                </h1>

                <p>
                    How often do you go on vacation? <br>
                    Try it in this Around-The-World Challenge
                </p>

                <button onclick = "startGame()">START</button>
            </div>
        </div>
<div id="map-screen" style="display: none;">
        
        <div class="price-tag">
            <div class="currency">$</div>
            <div class="amount"></div>
        </div>

        <div class="map-card">
            <h1>World Map</h1>
            <p>
                You have $4000 to spend on your trip. <br>
                Travel through the continents and Choose your activities wisely.
            </p>
        </div>

        <div class="map-container">
            <img src="Images/worldmap1.png" class="map">
            <img src="Images/plane.png" class="plane">

            <svg class="routes" viewBox="0 0 900 500">
                <path d="M150 230 Q300 100 430 180" />
                <path d="M430 180 Q500 250 450 320" />
                <path d="M450 320 Q600 200 700 240" />
            </svg>

            <img src="Images/pin.png" class="marker-start" onclick="flyToMexico()">
            <div class="marker marker-1"></div>
            <div class="marker marker-2"></div>
            <div class="marker marker-3"></div>

            <img src="Images/path.png" class="path">
        </div>
    </div>


        <script src = "game.js"></script>
    </body>
</html>
