<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Travel the World</title>

        <link href = "https://fonts.googleapis.com/css2?family=Titan+One&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
        <link rel = "stylesheet" href="style.css">

    </head>
    <body>
        <div id = "plane-ticket-screen"> 
            <div class = "plane-ticket-card">
                <h1>
                    You start your travels close to Tokyo, Japan. <br>
                    Choose which class you want to fly.
                </h1>
                <div class="price-tag">
                    <div class="currency">$</div>
                    <div class="amount">4000</div>
                </div>
                <img src="Japan/japan.png" class="africa-city">
                <img src = "Japan/Japan Plane Tickets/japan-economy-class.png" class = "economy-class" onclick = "buyTicket(300,'japan-activity.html')">
                <img src = "Japan/Japan Plane Tickets/japan-business-class.png" class = "business-class" onclick = "buyTicket(600,'japan-activity.html')">
                <img src = "Japan/Japan Plane Tickets/japan-first-class.png" class = "first-class" onclick = "buyTicket(900,'japan-activity.html')">
            </div>
        </div>
        <script src = "game.js"></script>
    </body>
</html>
