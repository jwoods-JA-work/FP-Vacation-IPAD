<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Game</title>

    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sumo-game-screen">
    <div class="price-tag">
        <div class="currency">$</div><div class="amount"></div>
    </div>
    <h1>Sumo Showdown</h1>
    <p>Mash the PUSH button to push the champion out of the ring! You have 5 seconds!</p>
    
    <div id="sumo-ring">
        <div id="sumo-wrestler">🤼</div>
    </div>
    
    <button onclick="pushSumo()" id="push-btn">💥 PUSH!!</button>
</div>

<script src="game.js"></script>
</body>
</html>
