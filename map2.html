<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel the World - Map 2</title>

    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map-screen">
        
        <div class="price-tag">
            <div class="currency">$</div>
            <div class="amount"></div> </div>

        <div class="map-card">
            <h1>World Map</h1>
            <p>
                Next stop! Click the animated pin to fly to your second destination.
            </p>
        </div>

<div class="map-container">
            <img src="worldmap1.png" class="map">
            
            <img src="plane.png" class="plane" style="left: 12.5%; top: 37%;">

            <svg class="routes" viewBox="0 0 900 500">
                <path d="M150 230 Q300 100 430 180" />
                <path d="M430 180 Q500 250 450 320" />
                <path d="M450 320 Q600 200 700 240" />
            </svg>

            <div class="marker-start" style="display: flex; align-items: center; justify-content: center; font-size: clamp(30px, 5vw, 50px); cursor: default; animation: none;">✅</div>
            
            <img src="pin.png" class="marker marker-1" style="animation: heartbeat 1.5s infinite; cursor: pointer; width: clamp(50px, 6vw, 80px); height: auto;" onclick="flyToNextLocation()">
            
            <div class="marker marker-2"></div>
            <div class="marker marker-3"></div>

            <img src="path.png" class="path">
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
